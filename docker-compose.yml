version: "3.9"

services:
  sql2025:
    # Build‑Kontext: das Repository‑Root
    build:
      context: .
      dockerfile: Dockerfile
    # Nach dem Build wird das Image lokal mit diesem Tag versehen
    image: sql2025-dev:latest
    container_name: sql2025-dev
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      # Das Passwort wird beim Deploy über Portainer als Variable überschrieben
      MSSQL_SA_PASSWORD: ""
    ports:
      - "1433:1433"
    volumes:
      - sql2025-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  # Das Volume wurde vorher in Portainer angelegt (external = true)
  sql2025-data:
    external: true
