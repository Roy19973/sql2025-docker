version: "3.9"

services:
  sql2025:
    # ------------------ Build‑Kontext ------------------
    build:
      context: .
      dockerfile: Dockerfile
    # ------------------ Image‑Name (nach Build) ------------------
    image: sql2025-dev:latest
    container_name: sql2025-dev
    # ------------------ Laufzeit‑Parameter ------------------
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      # **Kein Passwort hier!** Wir setzen es später als Stack‑Variable.
      MSSQL_SA_PASSWORD: ""         # leer lassen, wird überschrieben
    ports:
      - "1433:1433"
    # ------------------ Persistenter Speicher ------------------
    volumes:
      - sql2025-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sql2025-data:
    external: true       # Wir legen das Volume manuell an (Siehe Schritt 2)
