version: "3.9"

services:
  sql2025:
    build:
      context: .
      dockerfile: Dockerfile
    image: sql2025-dev:latest
    container_name: sql2025-dev
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ""   # wird über Stack‑Variable gesetzt
    ports:
      - "1433:1433"
    volumes:
      - sql2025-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sql2025-data:
    external: true
